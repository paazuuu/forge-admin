spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    dynamic:
      # 设置默认的数据源或者数据源组,默认值即为 master
      primary: master
      # 严格模式 匹配不到数据源则报错
      strict: true
      datasource:
        # 主库数据源
        master:
          type: ${spring.datasource.type}
          driverClassName: com.mysql.cj.jdbc.Driver
          # jdbc 所有参数配置参考 https://lionli.blog.csdn.net/article/details/122018562
          # rewriteBatchedStatements=true 批处理优化 大幅提升批量插入更新删除性能(对数据库有性能损耗 使用批量操作应考虑性能问题)
          url: jdbc:mysql://localhost:3306/forge_admin?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
          username: root
          password: 'your_password'
      hikari:
        # 最大连接池数量
        maxPoolSize: 20
        # 最小空闲线程数量
        minIdle: 10
        # 配置获取连接等待超时的时间
        connectionTimeout: 30000
        # 校验超时时间
        validationTimeout: 5000
        # 空闲连接存活最大时间，默认10分钟
        idleTimeout: 600000
        # 此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认30分钟
        maxLifetime: 1800000
        # 多久检查一次连接的活性
        keepaliveTime: 30000

spring.data:
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # redis 密码必须配置
    password: 'your_redis_password'
    # 连接超时时间
    timeout: 10s
    # 是否开启ssl
    ssl.enabled: false
    # Redisson配置
    redisson:
      config: |
        singleServerConfig:
          address: "redis://localhost:6379"
          database: 0
          password: forge123456
          connectTimeout: 10000
          timeout: 3000
          retryAttempts: 3
          retryInterval: 1500
          connectionPoolSize: 64
          connectionMinimumIdleSize: 10
        threads: 16
        nettyThreads: 32

# MCP Server 默认关闭且只允许 Streamable HTTP。开启后长期 fcp_ 密钥只能换取短期 fdu_ Token。
# FORGE_MCP_ENABLED=true 时必须同时配置 issuer/resource 以及三个互不相同的 Pepper：
# FORGE_CAPABILITY_CLIENT_PEPPER（至少16字符）、FORGE_CAPABILITY_TOKEN_PEPPER（至少32字符）、
# FORGE_CAPABILITY_AUTH_CODE_PEPPER（至少32字符）。生产 issuer/resource 必须使用 HTTPS。
# 浏览器型 MCP 客户端还应通过 FORGE_CAPABILITY_MCP_ALLOWED_ORIGINS 配置精确 Origin 白名单。
# 受控业务动作默认跟随 FORGE_MCP_ENABLED，可用 FORGE_CAPABILITY_SECURE_ACTIONS_ENABLED=false 单独关闭。
config:
  datasource:
    url: ${spring.datasource.dynamic.datasource.master.url}
    username: ${spring.datasource.dynamic.datasource.master.username}
    password: ${spring.datasource.dynamic.datasource.master.password}
    driverClassName: ${spring.datasource.dynamic.datasource.master.driverClassName}
