# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8580
  servlet:
    # 应用的访问路径
    context-path: /
  # undertow 配置
  undertow:
    # HTTP post内容的最大大小。当值为-1时，默认值为大小是无限的
    max-http-post-size: -1
    # 以下的配置会影响buffer,这些buffer会用于服务器连接的IO操作,有点类似netty的池化内存管理
    # 每块buffer的空间大小,越小的空间被利用越充分
    buffer-size: 512
    # 是否分配的直接内存
    direct-buffers: true
    threads:
      # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程
      io: 8
      # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载
      worker: 256

# 日志配置
logging:
  level:
    com.forge: @logging.level@
    org.springframework: error
    org.mybatis.spring.mapper: error
    com.mdframe.forge.plugin.ai.client.AiClientImpl: INFO
  config: classpath:logback.xml

# Spring配置
spring:
  application:
    name: forge-admin-server
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: @profiles.active@
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  mvc:
    # 设置静态资源路径 防止所有请求都去查静态资源
    static-path-pattern: /static/**
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  jackson:
    # 日期格式化
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      # 格式化输出
      indent_output: false
      # 忽略无法转换的对象
      fail_on_empty_beans: false
    deserialization:
      # 允许对象忽略json中不存在的属性
      fail_on_unknown_properties: false
  flyway:
    enabled: ${FORGE_FLYWAY_ENABLED:true}
    locations: ${FORGE_FLYWAY_LOCATIONS:filesystem:./db/migration,filesystem:../db/migration,filesystem:forge-server/db/migration}
    fail-on-missing-locations: false
    baseline-on-migrate: true
    baseline-version: 1.0.0
    table: forge_schema_history
    placeholder-replacement: false
  ai:
    chat:
      observations:
        log-prompt: true      # Spring AI 内部也记录 prompt
        log-completion: true  # Spring AI 内部也记录 completion
    mcp:
      server:
        # 默认关闭；开启后只接受 Identity 模块签发的短期 fdu_ Bearer Token
        enabled: ${FORGE_MCP_ENABLED:false}
        name: forge-ai-hub
        version: 1.0.0
        type: SYNC
        stdio: false
        # Spring AI 1.1.2 默认仍是 SSE，必须显式锁定 Streamable HTTP
        protocol: STREAMABLE
        annotation-scanner:
          enabled: false
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
        streamable-http:
          mcp-endpoint: /mcp
# MyBatisPlus配置
# https://baomidou.com/config/
mybatis-plus:
  # 多包名使用
  mapperPackage: com.mdframe.forge.**.mapper
  # 对应的 XML 文件位置
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.mdframe.forge.**.domain
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    useGeneratedKeys: true
    defaultExecutorType: SIMPLE
    logImpl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    dbConfig:
      # 主键类型
      # AUTO 自增 NONE 空 INPUT 用户输入 ASSIGN_ID 雪花 ASSIGN_UUID 唯一 UUID
      # 如需改为自增 需要将数据库表全部设置为自增
      idType: ASSIGN_ID
# Sa-Token 配置
sa-token:
  # 使用Redis存储Session
  alone-redis:
    # Redis数据库索引（默认为0）
    database: 1
    # Redis服务器地址
    host: ${spring.data.redis.host}
    # Redis服务器连接端口
    port: ${spring.data.redis.port}
    # Redis服务器连接密码（默认为空）
    password: ${spring.data.redis.password}
    # 连接超时时间（毫秒）
    timeout: 10000
sms:
  config-type: interface
forge:
  capability:
    # 机器客户端密钥 HMAC Pepper；无默认值，创建/轮换/验证凭据时缺失会失败关闭
    client-pepper: ${FORGE_CAPABILITY_CLIENT_PEPPER:}
    secure-actions:
      # 仅发布固定 search/describe/invoke 元工具；业务动作仍需 USER 委托、grant、字段白名单与 elicitation
      enabled: ${FORGE_CAPABILITY_SECURE_ACTIONS_ENABLED:${FORGE_MCP_ENABLED:false}}
    flow-actions:
      # 复用固定元工具，首批仅开放已发布 FLOW 绑定的 START/APPROVE/REJECT
      enabled: ${FORGE_CAPABILITY_FLOW_ACTIONS_ENABLED:${FORGE_MCP_ENABLED:false}}
    high-risk:
      # HIGH 动作默认关闭；启用前必须通过环境变量提供版本化 256-bit KEK
      enabled: ${FORGE_CAPABILITY_HIGH_RISK_ENABLED:false}
      flow-model-key: forge_capability_high_risk_approval
      crypto:
        active-key-id: ${FORGE_CAPABILITY_HIGH_RISK_ACTIVE_KEY_ID:}
        keys:
          v1: ${FORGE_CAPABILITY_HIGH_RISK_KEK_V1:}
    identity:
      enabled: ${FORGE_CAPABILITY_IDENTITY_ENABLED:${FORGE_MCP_ENABLED:false}}
      issuer: ${FORGE_CAPABILITY_OAUTH_ISSUER:http://localhost:8580}
      resource: ${FORGE_CAPABILITY_MCP_RESOURCE:http://localhost:8580/mcp}
      # 两个 Pepper 均需至少 32 字符，禁止与客户端密钥 Pepper 共用
      token-pepper: ${FORGE_CAPABILITY_TOKEN_PEPPER:}
      authorization-code-pepper: ${FORGE_CAPABILITY_AUTH_CODE_PEPPER:}
      access-token-ttl: ${FORGE_CAPABILITY_TOKEN_TTL:10m}
      authorization-code-ttl: ${FORGE_CAPABILITY_AUTH_CODE_TTL:2m}
      allowed-origins: ${FORGE_CAPABILITY_MCP_ALLOWED_ORIGINS:}
  crypto:
    secretKey: 8r0fV9G3kLcNz7p2xQaA1w==
  api-config:
    enabled: false
  business:
    datasource:
      enabled: true
      tenant-routing-enabled-default: true
