<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSI-UI 数据库 ER 图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: #cbd5e1;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }
  .er-container {
    width: 100%;
    max-width: 1800px;
    overflow: auto;
    background: #1e293b;
    border-radius: 12px;
    border: 1px solid #334155;
    padding: 20px;
  }
  .er-svg {
    width: 100%;
    min-width: 1600px;
  }
  .table-group { cursor: move; }
  .table-group:hover .table-rect { filter: brightness(1.15); }
  .table-rect {
    rx: 8; ry: 8;
    stroke-width: 1.5;
    transition: filter 0.2s;
  }
  .header-rect { rx: 8; ry: 8; }
  .header-text {
    fill: #fff;
    font-size: 13px;
    font-weight: 700;
    pointer-events: none;
  }
  .field-text {
    font-size: 11px;
    fill: #cbd5e1;
    pointer-events: none;
  }
  .field-text.pk { fill: #fbbf24; font-weight: 600; }
  .field-text.fk { fill: #60a5fa; font-weight: 600; }
  .type-text {
    font-size: 10px;
    fill: #64748b;
    pointer-events: none;
  }
  .relation-line {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.6;
  }
  .relation-line:hover { opacity: 1; stroke-width: 2.5; }
  .cardinality-text {
    font-size: 11px;
    font-weight: 700;
    fill: #94a3b8;
  }
  .tooltip {
    position: fixed;
    background: #1e293b;
    border: 1px solid #475569;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #e2e8f0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    max-width: 300px;
  }
  .tooltip.show { opacity: 1; }
</style>
</head>
<body>

<h1>PSI-UI 数据库 ER 图</h1>
<p class="subtitle">基于 01_ddl_create_tables.sql · OceanBase MySQL · 共 16 张表</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>主键 (PK)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>外键 (FK)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#64748b"></div>普通字段</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444;opacity:0.6"></div>一对多关系</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e;opacity:0.6"></div>逻辑关联</div>
</div>

<div class="er-container">
  <svg class="er-svg" id="erSvg" viewBox="0 0 1700 1100"></svg>
</div>
<div class="tooltip" id="tooltip"></div>

const HEADER_H = 32;
const ROW_H = 20;
const PADDING = 8;
const FIELD_NAME_W = 140;
const FIELD_TYPE_W = 110;
const TABLE_W = FIELD_NAME_W + FIELD_TYPE_W + PADDING * 2;

const tableMap = {};
tables.forEach(t => tableMap[t.name] = t);

function getTableHeight(t) {
  return HEADER_H + t.fields.length * ROW_H + PADDING;
}

function getFieldY(t, fieldName) {
  const idx = t.fields.findIndex(f => f.name === fieldName);
  if (idx === -1) return t.y + HEADER_H + PADDING;
  return t.y + HEADER_H + idx * ROW_H + ROW_H / 2;
}

function getTableCenterX(t) { return t.x + TABLE_W / 2; }
function getTableBottomY(t) { return t.y + getTableHeight(t); }

const svg = document.getElementById('erSvg');

const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
defs.innerHTML = `
  <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" opacity="0.7"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" opacity="0.7"/>
  </marker>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
  </filter>
`;
svg.appendChild(defs);

const relGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
svg.appendChild(relGroup);

const tableGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
svg.appendChild(tableGroup);

tables.forEach(t => {
  const h = getTableHeight(t);
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.classList.add('table-group');
  g.setAttribute('transform', `translate(${t.x}, ${t.y})`);
  g.dataset.table = t.name;

  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.classList.add('table-rect');
  rect.setAttribute('width', TABLE_W);
  rect.setAttribute('height', h);
  rect.setAttribute('fill', '#1e293b');
  rect.setAttribute('stroke', t.color);
  rect.setAttribute('filter', 'url(#shadow)');
  g.appendChild(rect);

  const headerRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  headerRect.classList.add('header-rect');
  headerRect.setAttribute('width', TABLE_W);
  headerRect.setAttribute('height', HEADER_H);
  headerRect.setAttribute('fill', t.color);
  headerRect.setAttribute('opacity', '0.85');
  g.appendChild(headerRect);

  const headerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  headerText.classList.add('header-text');
  headerText.setAttribute('x', TABLE_W / 2);
  headerText.setAttribute('y', HEADER_H / 2 + 5);
  headerText.setAttribute('text-anchor', 'middle');
  headerText.textContent = t.name;
  g.appendChild(headerText);

  const commentText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  commentText.setAttribute('x', TABLE_W / 2);
  commentText.setAttribute('y', HEADER_H + 12);
  commentText.setAttribute('text-anchor', 'middle');
  commentText.setAttribute('font-size', '9px');
  commentText.setAttribute('fill', '#64748b');
  commentText.textContent = t.comment;
  g.appendChild(commentText);

  t.fields.forEach((f, i) => {
    const fy = HEADER_H + 18 + i * ROW_H;

    const nameText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameText.classList.add('field-text');
    if (f.pk) nameText.classList.add('pk');
    if (f.fk) nameText.classList.add('fk');
    nameText.setAttribute('x', PADDING);
    nameText.setAttribute('y', fy);
    const prefix = f.pk ? '🔑 ' : f.fk ? '🔗 ' : '';
    nameText.textContent = prefix + f.name;
    g.appendChild(nameText);

    const typeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    typeText.classList.add('type-text');
    typeText.setAttribute('x', TABLE_W - PADDING);
    typeText.setAttribute('y', fy);
    typeText.setAttribute('text-anchor', 'end');
    typeText.textContent = f.type;
    g.appendChild(typeText);
  });

  tableGroup.appendChild(g);
});

relations.forEach(r => {
  const fromT = tableMap[r.from];
  const toT = tableMap[r.to];
  if (!fromT || !toT) return;

  const fromY = getFieldY(fromT, r.fromField);
  const toY = getFieldY(toT, r.toField);

  let fromX, toX;
  const fromCX = fromT.x + TABLE_W / 2;
  const toCX = toT.x + TABLE_W / 2;

  if (fromCX < toCX) {
    fromX = fromT.x + TABLE_W;
    toX = toT.x;
  } else if (fromCX > toCX) {
    fromX = fromT.x;
    toX = toT.x + TABLE_W;
  } else {
    fromX = fromT.x + TABLE_W / 2;
    toX = toT.x + TABLE_W / 2;
  }

  const midX = (fromX + toX) / 2;
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.classList.add('relation-line');
  path.setAttribute('stroke', r.color);
  path.setAttribute('marker-end', r.color === '#ef4444' ? 'url(#arrow-red)' : 'url(#arrow-green)');
  path.setAttribute('d', `M ${fromX} ${fromY} C ${midX} ${fromY}, ${midX} ${toY}, ${toX} ${toY}`);

  const tooltip = document.getElementById('tooltip');
  path.addEventListener('mouseenter', (e) => {
    tooltip.textContent = `${r.from}.${r.fromField} → ${r.to}.${r.toField} (${r.label})`;
    tooltip.classList.add('show');
  });
  path.addEventListener('mousemove', (e) => {
    tooltip.style.left = e.clientX + 12 + 'px';
    tooltip.style.top = e.clientY - 30 + 'px';
  });
  path.addEventListener('mouseleave', () => {
    tooltip.classList.remove('show');
  });

  relGroup.appendChild(path);

  const labelX = (fromX + toX) / 2;
  const labelY = (fromY + toY) / 2 - 6;
  const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  label.classList.add('cardinality-text');
  label.setAttribute('x', labelX);
  label.setAttribute('y', labelY);
  label.setAttribute('text-anchor', 'middle');
  label.setAttribute('fill', r.color);
  label.textContent = r.label;
  relGroup.appendChild(label);
});

let dragging = null;
let offsetX = 0, offsetY = 0;

svg.addEventListener('mousedown', (e) => {
  const g = e.target.closest('.table-group');
  if (!g) return;
  dragging = g;
  const pt = svg.createSVGPoint();
  pt.x = e.clientX;
  pt.y = e.clientY;
  const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
  const transform = g.getAttribute('transform');
  const match = transform.match(/translate\(([^,]+),\s*([^)]+)\)/);
  if (match) {
    offsetX = svgP.x - parseFloat(match[1]);
    offsetY = svgP.y - parseFloat(match[2]);
  }
  e.preventDefault();
});

svg.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const pt = svg.createSVGPoint();
  pt.x = e.clientX;
  pt.y = e.clientY;
  const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
  const newX = svgP.x - offsetX;
  const newY = svgP.y - offsetY;
  dragging.setAttribute('transform', `translate(${newX}, ${newY})`);

  const tName = dragging.dataset.table;
  const t = tableMap[tName];
  if (t) {
    t.x = newX;
    t.y = newY;
  }
  redrawRelations();
});

svg.addEventListener('mouseup', () => { dragging = null; });
svg.addEventListener('mouseleave', () => { dragging = null; });

function redrawRelations() {
  while (relGroup.firstChild) relGroup.removeChild(relGroup.firstChild);

  relations.forEach(r => {
    const fromT = tableMap[r.from];
    const toT = tableMap[r.to];
    if (!fromT || !toT) return;

    const fromY = getFieldY(fromT, r.fromField);
    const toY = getFieldY(toT, r.toField);

    let fromX, toX;
    const fromCX = fromT.x + TABLE_W / 2;
    const toCX = toT.x + TABLE_W / 2;

    if (fromCX < toCX) {
      fromX = fromT.x + TABLE_W;
      toX = toT.x;
    } else if (fromCX > toCX) {
      fromX = fromT.x;
      toX = toT.x + TABLE_W;
    } else {
      fromX = fromT.x + TABLE_W / 2;
      toX = toT.x + TABLE_W / 2;
    }

    const midX = (fromX + toX) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.classList.add('relation-line');
    path.setAttribute('stroke', r.color);
    path.setAttribute('marker-end', r.color === '#ef4444' ? 'url(#arrow-red)' : 'url(#arrow-green)');
    path.setAttribute('d', `M ${fromX} ${fromY} C ${midX} ${fromY}, ${midX} ${toY}, ${toX} ${toY}`);

    const tooltip = document.getElementById('tooltip');
    path.addEventListener('mouseenter', (e) => {
      tooltip.textContent = `${r.from}.${r.fromField} → ${r.to}.${r.toField} (${r.label})`;
      tooltip.classList.add('show');
    });
    path.addEventListener('mousemove', (e) => {
      tooltip.style.left = e.clientX + 12 + 'px';
      tooltip.style.top = e.clientY - 30 + 'px';
    });
    path.addEventListener('mouseleave', () => {
      tooltip.classList.remove('show');
    });

    relGroup.appendChild(path);

    const labelX = (fromX + toX) / 2;
    const labelY = (fromY + toY) / 2 - 6;
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.classList.add('cardinality-text');
    label.setAttribute('x', labelX);
    label.setAttribute('y', labelY);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', r.color);
    label.textContent = r.label;
    relGroup.appendChild(label);
  });
}
</script>
